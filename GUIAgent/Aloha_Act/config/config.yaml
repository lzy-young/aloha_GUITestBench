cache_dir: "./.cache"
log_dir: "./logs"
trace_dir: "GUIAgent/Aloha_Act/trace_data/osworld"
skill_dir: "GUIAgent/Aloha_Act/skill_data/osworld"
db_path: "GUIAgent/Aloha_Act/chromadb"
action_example_dir: "./trace_data"
enable_action_examples: true
enable_observer: true
observer_model: "ui-tars"
observer_max_tokens: 2000
decomposer_model: "ui-tars"
decomposer_max_tokens: 2000

# ROIDiff settings (used by RuleObserver)
roidiff_threshold: 10
roidiff_window_size: 1000
progress_threshold: 0.01

# model settings
planner_model: "ui-tars"
actor_model: "ui-tars"
embedding_model: "Qwen/Qwen3-Embedding-0.6B"
top_k: 3
distance_threshold: 0.3
planner_max_tokens: 8000
os_name: "android"  # "windows", "mac", "linux"
